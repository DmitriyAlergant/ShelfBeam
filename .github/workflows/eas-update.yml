name: EAS Update

on:
  push:
    branches: [main]
    paths:
      - "app-mobile/**"

jobs:
  eas-update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-mobile/package-lock.json

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: eas update --branch preview --non-interactive --message "${{ github.event.head_commit.message }}"
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_DEV_AUTH_BYPASS: "false"
