services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      echo 'Bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}

  app-backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      LANDING_QR_URL: ${LANDING_QR_URL}
      PORT: "3000"
    volumes:
      - ./app-backend/src:/app/src
      - ./app-backend/drizzle:/app/drizzle
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      API_BASE_URL: http://app-backend:3000
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      TEST_USER_ID: ${TEST_USER_ID}
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY}
      ROBOFLOW_MODEL_ID: ${ROBOFLOW_MODEL_ID}
      ROBOFLOW_API_URL: ${ROBOFLOW_API_URL}
      ROBOFLOW_TIMEOUT_SECONDS: ${ROBOFLOW_TIMEOUT_SECONDS}
      ROBOFLOW_RETRIES: ${ROBOFLOW_RETRIES}
      OCR_BACKEND: ${OCR_BACKEND}
      OCR_LLM_MODEL: ${OCR_LLM_MODEL}
      NORMALIZATION_MODEL: ${NORMALIZATION_MODEL}
      NORMALIZATION_BATCH_SIZE: ${NORMALIZATION_BATCH_SIZE}
      RECOMMENDATION_MODEL: ${RECOMMENDATION_MODEL}
      MLX_OCR_URL: ${MLX_OCR_URL}
      HF_ENDPOINT_URL: ${HF_ENDPOINT_URL}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      OCR_LANGUAGES: ${OCR_LANGUAGES}
      MAX_CONCURRENT_SCANS: ${MAX_CONCURRENT_SCANS}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./worker/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    environment:
      LANDING_IOS_QR_URL: ${LANDING_IOS_QR_URL}
      LANDING_ANDROID_QR_URL: ${LANDING_ANDROID_QR_URL}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./landing/src:/app/src
      - ./landing/public:/app/public
      - ./landing/astro.config.mjs:/app/astro.config.mjs

volumes:
  pgdata:
  minio-data:
